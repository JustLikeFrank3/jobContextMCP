apiVersion: v1
kind: Service
metadata:
  name: jcmcp
  namespace: jcmcp
spec:
  selector:
    app: jcmcp
  ports:
    - name: http
      port: 80
      targetPort: 8000
  # ClusterIP — traffic enters via the nginx-ingress LoadBalancer.
  # See k8s/ingress.yaml for the Ingress resource.
  type: ClusterIP

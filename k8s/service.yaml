apiVersion: v1
kind: Service
metadata:
  name: jcmcp
  namespace: jcmcp
spec:
  selector:
    app: jcmcp
  ports:
    - name: http
      port: 80
      targetPort: 8000
  # LoadBalancer provisions an Azure public IP — no port-forward needed.
  # The IP will appear under EXTERNAL-IP after: kubectl get svc -n jcmcp
  # Lock it down via API_KEY in the secret / .env if exposed publicly.
  type: LoadBalancer

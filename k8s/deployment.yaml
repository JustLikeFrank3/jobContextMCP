apiVersion: apps/v1
kind: Deployment
metadata:
  name: jcmcp
  namespace: jcmcp
  labels:
    app: jcmcp
spec:
  replicas: 1                  # ReadWriteOnce PVC — must stay at 1
  strategy:
    type: Recreate             # Required with RWO disk — no rolling update
  selector:
    matchLabels:
      app: jcmcp
  template:
    metadata:
      labels:
        app: jcmcp
        azure.workload.identity/use: "true"   # Workload Identity binding
    spec:
      serviceAccountName: jcmcp-workload-sa

      # ── Init container ────────────────────────────────────────────────────
      # Copies static workspace files from Key Vault CSI mount into the
      # writable PVC on first boot. Uses cp -n (no-clobber) so hand-edited
      # files on the PVC are never overwritten on pod restart.
      initContainers:
        - name: seed-workspace
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              echo "Seeding workspace from Key Vault..."
              # Create directory structure if missing
              mkdir -p /app/data/workspace/01-Current-Optimized
              mkdir -p /app/data/workspace/06-Reference-Materials
              mkdir -p /app/data/workspace/07-Job-Assessments
              mkdir -p /app/data/workspace/08-Interview-Prep-Docs
              mkdir -p /app/data/workspace/02-Cover-Letters
              mkdir -p /app/data/workspace/leetcode
              # Copy each file — -n means skip if already present
              for f in /app/secrets/*; do
                rel="${f#/app/secrets/}"
                dest="/app/data/workspace/${rel}"
                mkdir -p "$(dirname "$dest")"
                cp -n "$f" "$dest" && echo "  seeded: $rel" || echo "  exists: $rel"
              done
              echo "Seed complete."
          volumeMounts:
            - name: workspace-secrets   # Key Vault CSI — read-only
              mountPath: /app/secrets
              readOnly: true
            - name: data                # PVC — writable
              mountPath: /app/data

      # ── Main container ────────────────────────────────────────────────────
      containers:
        - name: jcmcp
          image: <ACR_NAME>.azurecr.io/jcmcp:<IMAGE_TAG>
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: START_MODE
              value: "http"
            - name: USE_SQLITE
              value: "1"
            - name: ENABLE_REMOTE
              value: "true"
            # Secrets injected from k8s Secret (created via scripts/seed_keyvault.sh)
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: jcmcp-app-secrets
                  key: openai_api_key
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: config
              mountPath: /app/config.json
              subPath: config.json
              readOnly: true
            # CSI volume must also be mounted on the main container to keep
            # the SecretProviderClass active (driver requirement).
            - name: workspace-secrets
              mountPath: /app/secrets
              readOnly: true

      # ── Volumes ───────────────────────────────────────────────────────────
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: jcmcp-data

        - name: config
          configMap:
            name: jcmcp-config

        - name: workspace-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: jcmcp-workspace-files

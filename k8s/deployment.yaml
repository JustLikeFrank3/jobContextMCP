apiVersion: apps/v1
kind: Deployment
metadata:
  name: jcmcp
  namespace: jcmcp
  labels:
    app: jcmcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jcmcp
  template:
    metadata:
      labels:
        app: jcmcp
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: jcmcp-workload-sa
      initContainers:
        - name: seed-workspace
          image: mcr.microsoft.com/azure-cli:latest
          command:
            - sh
            - -c
            - |
              set -e
              echo "Seeding workspace from Blob Storage..."
              mkdir -p /app/data/workspace/01-Current-Optimized
              mkdir -p /app/data/workspace/06-Reference-Materials
              mkdir -p /app/data/workspace/07-Job-Assessments
              mkdir -p /app/data/workspace/08-Interview-Prep-Docs
              mkdir -p /app/data/workspace/02-Cover-Letters
              mkdir -p /app/data/workspace/leetcode
              az storage blob download-batch \
                --account-name "${STORAGE_ACCOUNT}" \
                --source workspace \
                --destination /app/data/workspace \
                --overwrite false \
                --auth-mode login \
                --output none
              echo "Seed complete."
          env:
            - name: STORAGE_ACCOUNT
              valueFrom:
                configMapKeyRef:
                  name: jcmcp-config
                  key: storage_account
          volumeMounts:
            - name: data
              mountPath: /app/data
      containers:
        - name: jcmcp
          image: <ACR_NAME>.azurecr.io/jcmcp:<IMAGE_TAG>
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: START_MODE
              value: "http"
            - name: USE_SQLITE
              value: "1"
            - name: ENABLE_REMOTE
              value: "true"
            # LLM_PROVIDER overrides llm_provider in config.json.
            # LLM_API_KEY is used as the API key regardless of provider
            # (openai_api_key for openai, azure_foundry_api_key for foundry).
            # Ollama needs no key — leave LLM_API_KEY secret blank.
            - name: LLM_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: jcmcp-app-secrets
                  key: llm_provider
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: jcmcp-app-secrets
                  key: llm_api_key
                  optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: config
              mountPath: /app/config.json
              subPath: config.json
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: jcmcp-data
        - name: config
          configMap:
            name: jcmcp-config

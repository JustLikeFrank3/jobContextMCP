apiVersion: apps/v1
kind: Deployment
metadata:
  name: jcmcp
  namespace: jcmcp
  labels:
    app: jcmcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jcmcp
  template:
    metadata:
      labels:
        app: jcmcp
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: jcmcp-workload-sa
      initContainers:
        - name: seed-workspace
          image: mcr.microsoft.com/azure-cli:2.61.0
          command:
            - sh
            - -c
            - |
              set -e
              echo "Seeding tenant data from Blob Storage..."
              # Workload identity: federated token file is injected by the webhook.
              az login \
                --federated-token "$(cat "$AZURE_FEDERATED_TOKEN_FILE")" \
                --service-principal \
                -u "$AZURE_CLIENT_ID" \
                --tenant "$AZURE_TENANT_ID" \
                --output none
              # Remove legacy root-level data trees left behind by the earlier
              # single-user layout. The live data model now lives under
              # /app/data/users/{oid}/, so these duplicates should never be
              # preserved across pod restarts.
              rm -rf /app/data/data /app/data/workspace/data
              # Restore all tenant data in one operation.
              # Blob layout: workspace/users/{oid}/workspace/...
              #                           users/{oid}/jobcontextmcp.db
              #                           users/{oid}/*.json
              # Restored to:  /app/data/users/{oid}/workspace/...
              #                           users/{oid}/jobcontextmcp.db
              #                           users/{oid}/*.json
              mkdir -p /app/data/users
              az storage blob download-batch \
                --account-name "${STORAGE_ACCOUNT}" \
                --source workspace \
                --pattern "users/*" \
                --destination /app/data \
                --overwrite true \
                --auth-mode login \
                --output none && echo "Tenant data restored." || echo "No tenant data in blob yet (first boot)."
              echo "Seed complete."
          env:
            - name: STORAGE_ACCOUNT
              valueFrom:
                configMapKeyRef:
                  name: jcmcp-config
                  key: storage_account
          volumeMounts:
            - name: data
              mountPath: /app/data
      containers:
        - name: jcmcp
          image: <ACR_NAME>.azurecr.io/jcmcp:<IMAGE_TAG>
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: START_MODE
              value: "http"
            - name: USE_SQLITE
              value: "1"
            - name: SQLITE_ONLY
              value: "0"
            - name: ENABLE_REMOTE
              value: "true"
            # Required alongside ENABLE_REMOTE to disable the MCP SDK's
            # DNS rebinding check when running behind the AKS nginx ingress.
            - name: DISABLE_REBINDING_CHECK
              value: "true"
            - name: ENTRA_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: jcmcp-app-secrets
                  key: entra_tenant_id
            - name: ENTRA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: jcmcp-app-secrets
                  key: entra_client_id
            - name: ENTRA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jcmcp-app-secrets
                  key: entra_client_secret
            - name: ENTRA_OWNER_OID
              valueFrom:
                configMapKeyRef:
                  name: jcmcp-config
                  key: entra_owner_oid
            # LLM_PROVIDER overrides llm_provider in config.json.
            # LLM_API_KEY is used as the API key regardless of provider
            # (openai_api_key for openai, azure_foundry_api_key for foundry).
            # Ollama needs no key — leave LLM_API_KEY secret blank.
            - name: LLM_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: jcmcp-app-secrets
                  key: llm_provider
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: jcmcp-app-secrets
                  key: llm_api_key
                  optional: true
          resources:
            requests:
              cpu: "50m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: config
              mountPath: /app/config.json
              subPath: config.json
              readOnly: true
        - name: workspace-sync
          image: mcr.microsoft.com/azure-cli:2.61.0
          command:
            - sh
            - -c
            - |
              set -e
              echo "Tenant sync sidecar ready. Syncing every 15 min."
              while true; do
                sleep 900
                az login \
                  --federated-token "$(cat "$AZURE_FEDERATED_TOKEN_FILE")" \
                  --service-principal \
                  -u "$AZURE_CLIENT_ID" \
                  --tenant "$AZURE_TENANT_ID" \
                  --output none 2>/dev/null
                # Sync all tenants in one operation.
                # Source: /app/data/users/{oid}/...
                # Dest:   workspace/users/{oid}/...
                if [ -d /app/data/users ] && [ -n "$(ls -A /app/data/users 2>/dev/null)" ]; then
                  az storage blob upload-batch \
                    --account-name "${STORAGE_ACCOUNT}" \
                    --source /app/data/users \
                    --destination workspace \
                    --destination-path users \
                    --overwrite true \
                    --auth-mode login \
                    --output none \
                    && echo "[$(date -u +%H:%M:%SZ)] tenant sync OK" \
                    || echo "[$(date -u +%H:%M:%SZ)] tenant sync FAILED"
                else
                  echo "[$(date -u +%H:%M:%SZ)] no tenant data to sync yet"
                fi
              done
          env:
            - name: STORAGE_ACCOUNT
              valueFrom:
                configMapKeyRef:
                  name: jcmcp-config
                  key: storage_account
          resources:
            requests:
              cpu: "5m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: jcmcp-data
        - name: config
          configMap:
            name: jcmcp-config

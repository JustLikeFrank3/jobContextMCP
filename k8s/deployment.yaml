apiVersion: apps/v1
kind: Deployment
metadata:
  name: jcmcp
  namespace: jcmcp
  labels:
    app: jcmcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jcmcp
  template:
    metadata:
      labels:
        app: jcmcp
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: jcmcp-workload-sa
      initContainers:
        - name: seed-workspace
          image: mcr.microsoft.com/azure-cli:latest
          command:
            - sh
            - -c
            - |
              set -e
              echo "Seeding workspace from Blob Storage..."
              # Workload identity: federated token file is injected by the webhook.
              # az CLI needs an explicit login before --auth-mode login works.
              az login \
                --federated-token "$(cat "$AZURE_FEDERATED_TOKEN_FILE")" \
                --service-principal \
                -u "$AZURE_CLIENT_ID" \
                --tenant "$AZURE_TENANT_ID" \
                --output none
              mkdir -p /app/data/workspace/01-Current-Optimized
              mkdir -p /app/data/workspace/02-Cover-Letters
              mkdir -p /app/data/workspace/03-Resume-PDFs
              mkdir -p /app/data/workspace/04-Archived-Resumes
              mkdir -p /app/data/workspace/05-Research
              mkdir -p /app/data/workspace/06-Reference-Materials
              mkdir -p /app/data/workspace/07-Job-Assessments
              mkdir -p /app/data/workspace/08-Interview-Prep-Docs
              mkdir -p /app/data/workspace/09-Cover-Letter-PDFs
              mkdir -p /app/data/workspace/leetcode
              # Sync all workspace files from blob: source materials + all generated artifacts.
              # Side effect: db/jobcontextmcp.db lands in /app/data/workspace/db/ — harmless,
              # the app reads from /app/data/jobcontextmcp.db (seeded separately below).
              az storage blob download-batch \
                --account-name "${STORAGE_ACCOUNT}" \
                --source workspace \
                --destination /app/data/workspace \
                --overwrite true \
                --auth-mode login \
                --output none
              # Seed personas on every boot (small, static config files — always safe to overwrite).
              mkdir -p /app/data/personas
              az storage blob download-batch \
                --account-name "${STORAGE_ACCOUNT}" \
                --source workspace \
                --pattern "personas/*" \
                --destination /app/data \
                --overwrite true \
                --auth-mode login \
                --output none && echo "Personas seeded." || echo "No personas in blob (skipping)."
              # Seed DB only on first boot — preserve runtime writes across restarts.
              if [ ! -f /app/data/jobcontextmcp.db ] || [ ! -s /app/data/jobcontextmcp.db ]; then
                echo "No DB found — seeding from Blob..."
                az storage blob download \
                  --account-name "${STORAGE_ACCOUNT}" \
                  --container-name workspace \
                  --name "db/jobcontextmcp.db" \
                  --file /app/data/jobcontextmcp.db \
                  --auth-mode login \
                  --output none
                echo "DB seeded."
              else
                echo "DB already exists — skipping seed."
              fi
              echo "Seed complete."
          env:
            - name: STORAGE_ACCOUNT
              valueFrom:
                configMapKeyRef:
                  name: jcmcp-config
                  key: storage_account
          volumeMounts:
            - name: data
              mountPath: /app/data
      containers:
        - name: jcmcp
          image: <ACR_NAME>.azurecr.io/jcmcp:<IMAGE_TAG>
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: START_MODE
              value: "http"
            - name: USE_SQLITE
              value: "1"
            - name: SQLITE_ONLY
              value: "0"
            - name: ENABLE_REMOTE
              value: "true"
            # LLM_PROVIDER overrides llm_provider in config.json.
            # LLM_API_KEY is used as the API key regardless of provider
            # (openai_api_key for openai, azure_foundry_api_key for foundry).
            # Ollama needs no key — leave LLM_API_KEY secret blank.
            - name: LLM_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: jcmcp-app-secrets
                  key: llm_provider
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: jcmcp-app-secrets
                  key: llm_api_key
                  optional: true
          resources:
            requests:
              cpu: "50m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: config
              mountPath: /app/config.json
              subPath: config.json
              readOnly: true
        - name: workspace-sync
          image: mcr.microsoft.com/azure-cli:latest
          command:
            - sh
            - -c
            - |
              set -e
              echo "Workspace sync sidecar ready. Syncing every 15 min."
              while true; do
                sleep 900
                az login \
                  --federated-token "$(cat "$AZURE_FEDERATED_TOKEN_FILE")" \
                  --service-principal \
                  -u "$AZURE_CLIENT_ID" \
                  --tenant "$AZURE_TENANT_ID" \
                  --output none 2>/dev/null
                az storage blob upload-batch \
                  --account-name "${STORAGE_ACCOUNT}" \
                  --source /app/data/workspace \
                  --destination workspace \
                  --overwrite true \
                  --auth-mode login \
                  --output none \
                  && echo "[$(date -u +%H:%M:%SZ)] workspace sync OK" \
                  || echo "[$(date -u +%H:%M:%SZ)] workspace sync FAILED"
                if [ -f /app/data/jobcontextmcp.db ] && [ -s /app/data/jobcontextmcp.db ]; then
                  az storage blob upload \
                    --account-name "${STORAGE_ACCOUNT}" \
                    --container-name workspace \
                    --name "db/jobcontextmcp.db" \
                    --file /app/data/jobcontextmcp.db \
                    --auth-mode login \
                    --overwrite true \
                    --output none \
                    && echo "[$(date -u +%H:%M:%SZ)] db sync OK" \
                    || echo "[$(date -u +%H:%M:%SZ)] db sync FAILED"
                fi
              done
          env:
            - name: STORAGE_ACCOUNT
              valueFrom:
                configMapKeyRef:
                  name: jcmcp-config
                  key: storage_account
          resources:
            requests:
              cpu: "5m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: jcmcp-data
        - name: config
          configMap:
            name: jcmcp-config

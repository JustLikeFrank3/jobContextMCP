# Pi-only: node_exporter for host metrics (CPU temp, RAM, disk, network).
# hostNetwork so Prometheus scrapes the node IP directly on :9100.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: monitoring
  labels:
    app: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      hostNetwork: true
      hostPID: true
      containers:
        - name: node-exporter
          image: quay.io/prometheus/node-exporter:v1.8.2
          args:
            - --path.rootfs=/host
            - --collector.thermal_zone
          ports:
            - containerPort: 9100
              hostPort: 9100
          resources:
            requests: { cpu: 10m, memory: 24Mi }
            limits: { cpu: 200m, memory: 64Mi }
          volumeMounts:
            - name: rootfs
              mountPath: /host
              readOnly: true
      volumes:
        - name: rootfs
          hostPath:
            path: /

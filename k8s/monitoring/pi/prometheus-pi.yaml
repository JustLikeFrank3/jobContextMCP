# Pi-only: replaces the base prometheus-config configmap (same name) with
# the Pi scrape set, and extends Prometheus RBAC to read node/cadvisor
# metrics. Applied AFTER the base k8s/monitoring/prometheus.yaml.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-node-reader
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/metrics, nodes/proxy]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-node-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-node-reader
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
    scrape_configs:
      - job_name: jobcontext-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [jcmcp-pi]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
      - job_name: node-exporter
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - source_labels: [__address__]
            regex: ([^:]+)(?::\d+)?
            replacement: $1:9100
            target_label: __address__
      - job_name: kube-state-metrics
        static_configs:
          - targets: [kube-state-metrics.monitoring.svc:8080]
      # Federate the cloud app series from AKS Prometheus via the local
      # tunnel (aks-prom-tunnel on the host). ONE request per interval —
      # kubectl port-forward wedges under concurrent connections, so the
      # wallboard's Cloud page reads these locally instead of querying
      # through the tunnel at render time (which never finished a first
      # render). namespace labels (jcmcp/jcmcp-qa) disambiguate from the
      # Pi's own jcmcp-pi series.
      - job_name: aks-federate
        honor_labels: true
        metrics_path: /federate
        params:
          "match[]":
            - '{namespace=~"jcmcp|jcmcp-qa"}'
        static_configs:
          - targets: ["192.168.101.2:9091"]
      - job_name: cadvisor
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          insecure_skip_verify: true
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        metrics_path: /metrics/cadvisor

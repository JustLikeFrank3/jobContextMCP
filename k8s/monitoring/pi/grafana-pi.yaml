# Pi-only Grafana extension:
#  - overrides the grafana-provisioning configmap (same name) to add the
#    Loki datasource alongside Prometheus
#  - adds a grafana-dashboard-pi configmap with the kiosk dashboards
#    (k8s health, live logs, Pi hardware); pi-deploy.sh patches the
#    grafana deployment to mount it at /var/lib/grafana/dashboards/pi
#    (the base provider loads that path recursively).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc:9090
        isDefault: true
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc:3100
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-pi
  namespace: monitoring
data:
  kiosk-k8s.json: |
    {
      "uid": "kiosk-k8s", "title": "Kubernetes — Pi", "tags": ["kiosk"],
      "timezone": "browser", "refresh": "30s", "schemaVersion": 39,
      "time": {"from": "now-3h", "to": "now"},
      "panels": [
        {"type": "stat", "title": "Pods running", "gridPos": {"x":0,"y":0,"w":4,"h":5},
         "datasource": {"uid":"prometheus"},
         "targets": [{"expr": "sum(kube_pod_status_phase{phase=\"Running\"})"}]},
        {"type": "stat", "title": "Pods not running", "gridPos": {"x":4,"y":0,"w":4,"h":5},
         "datasource": {"uid":"prometheus"},
         "targets": [{"expr": "sum(kube_pod_status_phase{phase=~\"Pending|Failed|Unknown\"}) or vector(0)"}],
         "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color":"green","value":null},{"color":"red","value":1}]}}}},
        {"type": "stat", "title": "Container restarts (24h)", "gridPos": {"x":8,"y":0,"w":4,"h":5},
         "datasource": {"uid":"prometheus"},
         "targets": [{"expr": "sum(increase(kube_pod_container_status_restarts_total[24h])) or vector(0)"}],
         "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color":"green","value":null},{"color":"orange","value":1},{"color":"red","value":5}]}}}},
        {"type": "stat", "title": "Deployments available", "gridPos": {"x":12,"y":0,"w":12,"h":5},
         "datasource": {"uid":"prometheus"},
         "targets": [{"expr": "sum(kube_deployment_status_replicas_available)"}]},
        {"type": "timeseries", "title": "CPU by pod", "gridPos": {"x":0,"y":5,"w":12,"h":9},
         "datasource": {"uid":"prometheus"},
         "targets": [{"expr": "sum by(pod)(rate(container_cpu_usage_seconds_total{container!=\"\",pod!=\"\"}[5m]))", "legendFormat": "{{pod}}"}],
         "fieldConfig": {"defaults": {"unit": "percentunit"}}},
        {"type": "timeseries", "title": "Memory (working set) by pod", "gridPos": {"x":12,"y":5,"w":12,"h":9},
         "datasource": {"uid":"prometheus"},
         "targets": [{"expr": "sum by(pod)(container_memory_working_set_bytes{container!=\"\",pod!=\"\"})", "legendFormat": "{{pod}}"}],
         "fieldConfig": {"defaults": {"unit": "bytes"}}},
        {"type": "timeseries", "title": "Restarts by pod (1h rate)", "gridPos": {"x":0,"y":14,"w":24,"h":7},
         "datasource": {"uid":"prometheus"},
         "targets": [{"expr": "sum by(pod)(increase(kube_pod_container_status_restarts_total[1h]))", "legendFormat": "{{pod}}"}]}
      ]
    }
  kiosk-logs.json: |
    {
      "uid": "kiosk-logs", "title": "Live Logs — jcmcp", "tags": ["kiosk"],
      "timezone": "browser", "refresh": "10s", "schemaVersion": 39,
      "time": {"from": "now-30m", "to": "now"},
      "panels": [
        {"type": "logs", "title": "jcmcp-pi app", "gridPos": {"x":0,"y":0,"w":24,"h":13},
         "datasource": {"uid":"loki"},
         "options": {"showTime": true, "wrapLogMessage": true, "sortOrder": "Descending"},
         "targets": [{"expr": "{namespace=\"jcmcp-pi\"}"}]},
        {"type": "logs", "title": "errors — all namespaces", "gridPos": {"x":0,"y":13,"w":24,"h":8},
         "datasource": {"uid":"loki"},
         "options": {"showTime": true, "sortOrder": "Descending"},
         "targets": [{"expr": "{namespace=~\".+\"} |~ `(?i)(error|traceback|exception|failed)`"}]}
      ]
    }
  kiosk-node.json: |
    {
      "uid": "kiosk-node", "title": "Node1 — Pi Hardware", "tags": ["kiosk"],
      "timezone": "browser", "refresh": "30s", "schemaVersion": 39,
      "time": {"from": "now-3h", "to": "now"},
      "panels": [
        {"type": "gauge", "title": "CPU temp", "gridPos": {"x":0,"y":0,"w":5,"h":7},
         "datasource": {"uid":"prometheus"},
         "targets": [{"expr": "avg(node_thermal_zone_temp)"}],
         "fieldConfig": {"defaults": {"unit": "celsius", "min": 20, "max": 90,
           "thresholds": {"steps": [{"color":"green","value":null},{"color":"orange","value":65},{"color":"red","value":80}]}}}},
        {"type": "gauge", "title": "CPU usage", "gridPos": {"x":5,"y":0,"w":5,"h":7},
         "datasource": {"uid":"prometheus"},
         "targets": [{"expr": "100*(1-avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])))"}],
         "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100,
           "thresholds": {"steps": [{"color":"green","value":null},{"color":"orange","value":70},{"color":"red","value":90}]}}}},
        {"type": "gauge", "title": "RAM used", "gridPos": {"x":10,"y":0,"w":5,"h":7},
         "datasource": {"uid":"prometheus"},
         "targets": [{"expr": "100*(1-node_memory_MemAvailable_bytes/node_memory_MemTotal_bytes)"}],
         "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100,
           "thresholds": {"steps": [{"color":"green","value":null},{"color":"orange","value":75},{"color":"red","value":90}]}}}},
        {"type": "bargauge", "title": "Disk used", "gridPos": {"x":15,"y":0,"w":9,"h":7},
         "datasource": {"uid":"prometheus"},
         "targets": [{"expr": "100*(1-node_filesystem_avail_bytes{mountpoint=~\"/|/mnt/backup\"}/node_filesystem_size_bytes{mountpoint=~\"/|/mnt/backup\"})", "legendFormat": "{{mountpoint}}"}],
         "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100,
           "thresholds": {"steps": [{"color":"green","value":null},{"color":"orange","value":75},{"color":"red","value":90}]}}}},
        {"type": "timeseries", "title": "CPU usage", "gridPos": {"x":0,"y":7,"w":12,"h":8},
         "datasource": {"uid":"prometheus"},
         "targets": [{"expr": "100*(1-avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])))", "legendFormat": "cpu %"}],
         "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100}}},
        {"type": "timeseries", "title": "Network eth0/wlan0", "gridPos": {"x":12,"y":7,"w":12,"h":8},
         "datasource": {"uid":"prometheus"},
         "targets": [
           {"expr": "rate(node_network_receive_bytes_total{device=~\"eth0|wlan0\"}[5m])", "legendFormat": "rx {{device}}"},
           {"expr": "rate(node_network_transmit_bytes_total{device=~\"eth0|wlan0\"}[5m])", "legendFormat": "tx {{device}}"}],
         "fieldConfig": {"defaults": {"unit": "Bps"}}},
        {"type": "timeseries", "title": "Disk I/O (SD + USB)", "gridPos": {"x":0,"y":15,"w":24,"h":7},
         "datasource": {"uid":"prometheus"},
         "targets": [
           {"expr": "rate(node_disk_written_bytes_total{device=~\"mmcblk0|sda\"}[5m])", "legendFormat": "write {{device}}"},
           {"expr": "rate(node_disk_read_bytes_total{device=~\"mmcblk0|sda\"}[5m])", "legendFormat": "read {{device}}"}],
         "fieldConfig": {"defaults": {"unit": "Bps"}}}
      ]
    }

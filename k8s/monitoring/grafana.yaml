# In-cluster Grafana OSS, fully provisioned as code: Prometheus datasource +
# the jobContext overview dashboard (separate configmap, grafana-dashboards.yaml).
#
# Admin credentials come from the `grafana-admin` secret, created out-of-band
# (never committed):
#   kubectl -n monitoring create secret generic grafana-admin \
#     --from-literal=admin-user=admin \
#     --from-literal=admin-password="$(openssl rand -base64 24)"
# Retrieve later:
#   kubectl -n monitoring get secret grafana-admin \
#     -o jsonpath='{.data.admin-password}' | base64 -d
#
# Reach it with:  kubectl -n monitoring port-forward svc/grafana 3000:3000
# or via https://grafana.jobcontext.ai after adding the GoDaddy CNAME
# (grafana → jobcontextmcp.eastus.cloudapp.azure.com).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc:9090
        isDefault: true
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: jobcontext
        folder: jobContext
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: managed-csi
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472    # grafana image user
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef: { name: grafana-admin, key: admin-user }
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: { name: grafana-admin, key: admin-password }
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: https://grafana.jobcontext.ai
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: provisioning-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: provisioning-dashboards
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: provisioning-datasources
          configMap:
            name: grafana-provisioning
            items: [{ key: datasource.yaml, path: datasource.yaml }]
        - name: provisioning-dashboards
          configMap:
            name: grafana-provisioning
            items: [{ key: dashboards.yaml, path: dashboards.yaml }]
        - name: dashboards
          configMap:
            name: grafana-dashboard-jobcontext
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: [grafana.jobcontext.ai]
      secretName: grafana-tls
  rules:
    - host: grafana.jobcontext.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

# SecretProviderClass — pulls static workspace files from Azure Key Vault
# and mounts them as read-only files inside the pod at /app/secrets/.
#
# The init container then copies them into the writable PVC at
# /app/data/workspace/ (preserving directory structure) on first boot.
#
# Prerequisites (run once — see scripts/seed_keyvault.sh):
#   az aks enable-addons --addons azure-keyvault-secrets-provider ...
#   az identity create --name jcmcp-workload-id ...
#   az keyvault create --name jcmcp-kv ...
#   az keyvault secret set --vault-name jcmcp-kv --name <name> --file <path>
#   az role assignment create ... (Key Vault Secrets User on jcmcp-kv)
#
# Replace <TENANT_ID>, <CLIENT_ID>, <KEYVAULT_NAME> before applying.
# These are safe to commit — they are resource identifiers, not secrets.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: jcmcp-workspace-files
  namespace: jcmcp
spec:
  provider: azure
  parameters:
    usePodIdentity:    "false"
    clientID:          "<CLIENT_ID>"          # managed identity client ID
    keyvaultName:      "jcmcp-kv"             # az keyvault create --name
    tenantId:          "<TENANT_ID>"          # az account show --query tenantId
    objects: |
      array:
        - |
          objectName: workspace-master-resume
          objectType: secret
          objectAlias: "01-Current-Optimized/Frank MacBride Resume - MASTER SOURCE WITH METRICS.txt"
        - |
          objectName: workspace-template-format
          objectType: secret
          objectAlias: "06-Reference-Materials/Frank MacBride Resume - Template Format.txt"
        - |
          objectName: workspace-gm-awards
          objectType: secret
          objectAlias: "06-Reference-Materials/GM Recognition Awards.txt"
        - |
          objectName: workspace-feedback-received
          objectType: secret
          objectAlias: "06-Reference-Materials/Feedback_Received.txt"
        - |
          objectName: workspace-skills-shorter
          objectType: secret
          objectAlias: "06-Reference-Materials/Skills - 10% Shorter.txt"
        - |
          objectName: workspace-leetcode-cheatsheet
          objectType: secret
          objectAlias: "leetcode/GM_Interview_Cheatsheet.md"
        - |
          objectName: workspace-quick-reference
          objectType: secret
          objectAlias: "leetcode/INTERVIEW_DAY_QUICK_REFERENCE.md"

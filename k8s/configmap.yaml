# ConfigMap — non-sensitive config.json values only.
# Secrets (openai_api_key, serpapi_key, etc.) are injected as env vars
# from a separate k8s Secret (see deployment.yaml env section).
# Paths are fixed to the container layout; never edit locally.
apiVersion: v1
kind: ConfigMap
metadata:
  name: jcmcp-config
  namespace: jcmcp
data:
  config.json: |
    {
      "data_folder":               "/app/data",
      "resume_folder":             "/app/data/workspace",
      "leetcode_folder":           "/app/data/workspace/leetcode",
      "job_assessments_dir":       "07-Job-Assessments",
      "interview_prep_docs_dir":   "08-Interview-Prep-Docs",
      "optimized_resumes_dir":     "01-Current-Optimized",
      "cover_letters_dir":         "02-Cover-Letters",
      "reference_materials_dir":   "06-Reference-Materials",
      "master_resume_path":        "01-Current-Optimized/Frank MacBride Resume - MASTER SOURCE WITH METRICS.txt",
      "leetcode_cheatsheet_path":  "GM_Interview_Cheatsheet.md",
      "quick_reference_path":      "INTERVIEW_DAY_QUICK_REFERENCE.md",
      "template_format_path":      "06-Reference-Materials/Frank MacBride Resume - Template Format.txt",
      "gm_awards_path":            "06-Reference-Materials/GM Recognition Awards.txt",
      "feedback_received_path":    "06-Reference-Materials/Feedback_Received.txt",
      "skills_shorter_path":       "06-Reference-Materials/Skills - 10% Shorter.txt",
      "resume_template_png":       "06-Reference-Materials/resume_template.png",
      "cover_letter_template_png": "06-Reference-Materials/cover_letter_template.png",
      "openai_model":              "gpt-4o",
      "llm_provider":              "openai"
    }

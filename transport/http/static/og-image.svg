<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" role="img" aria-label="jobContext — the memory layer for your career">
  <title>jobContext — the memory layer for your career</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#0A0F1C"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B5C8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00B5C8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="627" fill="url(#bg)"/>
  <ellipse cx="1050" cy="120" rx="420" ry="320" fill="url(#glow)"/>
  <rect x="0" y="619" width="1200" height="8" fill="#00B5C8"/>

  <!-- Framed patch badge (binary band legible at this size) -->
  <g transform="translate(120 158) scale(0.97)">
    <circle cx="160" cy="160" r="153" fill="#0A0F1C"/>
    <circle cx="160" cy="160" r="153" fill="none" stroke="#00B5C8" stroke-width="9"/>
    <circle cx="160" cy="160" r="139" fill="none" stroke="#00B5C8" stroke-width="2" stroke-opacity="0.35"/>
    <path d="M205 90 A48 48 0 1 0 205 170" fill="none" stroke="#00B5C8" stroke-width="30" stroke-linecap="round"/>
    <circle cx="120" cy="90" r="17" fill="#FFFFFF"/>
    <path d="M120 118 L120 176 Q120 197 97 197" fill="none" stroke="#FFFFFF" stroke-width="27" stroke-linecap="round"/>
    <path id="ogband" d="M44 168 A116 116 0 0 0 276 168" fill="none"/>
    <text fill="#FFFFFF" font-family="'JetBrains Mono',ui-monospace,monospace" font-weight="700" font-size="30" letter-spacing="9"><textPath href="#ogband" startOffset="50%" text-anchor="middle">00100100</textPath></text>
  </g>

  <!-- Wordmark + tagline -->
  <text x="500" y="300" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="104" font-weight="700" letter-spacing="-3"><tspan fill="#FFFFFF">job</tspan><tspan fill="#00B5C8">Context</tspan></text>
  <text x="504" y="356" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="500" fill="#D7E3F8">The memory layer for your career.</text>
  <text x="504" y="402" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="20" font-weight="600" fill="#6FE0EE" letter-spacing="0.5" opacity="0.9">Your career has context. Your AI should too.</text>
</svg>

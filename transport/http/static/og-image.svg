<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0F1C"/>
      <stop offset="100%" style="stop-color:#0B1220"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B5C8;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00B5C8;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="627" fill="url(#bg)"/>

  <!-- Subtle glow circle top-right -->
  <ellipse cx="1050" cy="120" rx="400" ry="300" fill="url(#glow)"/>

  <!-- Bottom border accent -->
  <rect x="0" y="619" width="1200" height="8" fill="#00B5C8"/>

  <!-- jobContext logo mark (scaled up, centered left) -->
  <g transform="translate(100, 220) scale(1.6)">
    <path d="M268.2 124.5 A80 80 0 1 0 268.2 175.5" fill="none" stroke="#00B5C8" stroke-width="46" stroke-linecap="round"/>
    <circle cx="84" cy="54" r="27" fill="#ffffff"/>
    <path d="M84 98 L84 207 Q84 250 41 250" fill="none" stroke="#ffffff" stroke-width="40" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="100" y="520" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">job<tspan fill="#00B5C8">Context</tspan></text>

  <!-- Tagline -->
  <text x="100" y="577" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" fill="#9AA8BF" letter-spacing="0">The memory layer for your career.</text>

  <!-- Right side pill badges -->
  <g transform="translate(760, 180)">
    <!-- Badge 1 -->
    <rect x="0" y="0" width="340" height="56" rx="28" fill="#111A2B" stroke="#23324D" stroke-width="1.5"/>
    <text x="170" y="37" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#D7E3F8" text-anchor="middle">Resumes &amp; cover letters</text>
    <!-- Badge 2 -->
    <rect x="30" y="76" width="340" height="56" rx="28" fill="#111A2B" stroke="#23324D" stroke-width="1.5"/>
    <text x="200" y="113" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#D7E3F8" text-anchor="middle">Interview prep</text>
    <!-- Badge 3 -->
    <rect x="0" y="152" width="340" height="56" rx="28" fill="#111A2B" stroke="#23324D" stroke-width="1.5"/>
    <text x="170" y="189" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#D7E3F8" text-anchor="middle">Application tracking</text>
    <!-- Badge 4 -->
    <rect x="30" y="228" width="340" height="56" rx="28" fill="#111A2B" stroke="#23324D" stroke-width="1.5"/>
    <text x="200" y="265" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#D7E3F8" text-anchor="middle">Outreach in your voice</text>
    <!-- Badge 5 — cyan highlight -->
    <rect x="0" y="304" width="340" height="56" rx="28" fill="#0B2A35" stroke="#00B5C8" stroke-width="1.5"/>
    <text x="170" y="341" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#00B5C8" text-anchor="middle">AI that remembers everything</text>
  </g>
</svg>

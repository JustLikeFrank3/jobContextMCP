name: Desktop Release

# Cut a desktop release, either way:
#
#   git tag desktop-v1.3.0-beta.1 && git push origin desktop-v1.3.0-beta.1
#
# or dispatch this workflow (Actions → Desktop Release → Run workflow, or
# `gh workflow run desktop-release.yml -f version=1.3.0-beta.1 -f target=<sha>`)
# — for release cutters without tag-push rights (e.g. branch-scoped agent
# sessions). On dispatch the tag is created by `gh release create --target`,
# so pass `target` explicitly to pin the exact TESTED main SHA; the default
# is the dispatched ref's head, which may be a badge-bot `[skip ci]` commit
# that must not be tagged.
#
# Builds the full installer matrix with the version stamped from the tag,
# then publishes a GitHub *pre-release* with every installer attached.
# The desktop-v* namespace is intentionally disjoint from the cloud
# product's v* tags (create-releases.yml + deploy.yml), so desktop betas
# never appear as /releases/latest for MCP-connector users. Tag triggers
# carry no paths filter — GitHub's paths matching is unreliable on tags.

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (1.3.0-beta.1 or desktop-v1.3.0-beta.1)'
        required: true
        type: string
      target:
        description: 'Commit SHA to tag (default: head of the dispatched ref)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  # One place resolves "which tag, at which commit" for both trigger shapes,
  # so build and release can't disagree.
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      target: ${{ steps.resolve.outputs.target }}
    steps:
      - id: resolve
        env:
          EVENT: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TARGET: ${{ inputs.target }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT" = "push" ]; then
            tag="$REF_NAME"
            target="$HEAD_SHA"
          else
            v="${INPUT_VERSION#desktop-v}"
            if [ -z "$v" ]; then
              echo "empty version input" >&2; exit 1
            fi
            tag="desktop-v${v}"
            target="${INPUT_TARGET:-$HEAD_SHA}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "releasing $tag at $target"

  build:
    needs: meta
    uses: ./.github/workflows/desktop-build.yml
    with:
      version: ${{ needs.meta.outputs.tag }}
    secrets: inherit

  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: jobcontext-installer-*
          path: installers
          merge-multiple: false

      - name: Publish pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
          TARGET: ${{ needs.meta.outputs.target }}
        run: |
          shopt -s globstar nullglob
          files=(installers/**/*.dmg installers/**/*.exe installers/**/*.msi
                 installers/**/*.AppImage installers/**/*.deb
                 installers/**/*.app.tar.gz installers/**/*.sig)
          echo "attaching ${#files[@]} installers + updater artifacts"

          # Updater manifest: version + per-platform artifact URL/signature,
          # consumed by tauri-plugin-updater in the installed apps. Attached
          # to this release AND clobbered onto the rolling `desktop-latest`
          # release (the fixed endpoint apps poll — /releases/latest can't be
          # used because desktop releases are pre-releases in a shared repo).
          python3 - "$TAG" <<'PYEOF'
          import datetime, json, os, pathlib, sys

          tag = sys.argv[1]
          version = tag.removeprefix("desktop-v")
          repo = os.environ["GITHUB_REPOSITORY"]
          base = f"https://github.com/{repo}/releases/download/{tag}"
          arts = {p.name: p for p in pathlib.Path("installers").rglob("*") if p.is_file()}

          def entry(name):
              sig = arts.get(name + ".sig")
              if name not in arts or sig is None:
                  return None
              return {"signature": sig.read_text().strip(), "url": f"{base}/{name}"}

          platforms = {}
          for key, name in [
              ("darwin-aarch64", f"jobContext_{version}_aarch64.app.tar.gz"),
              ("darwin-x86_64",  f"jobContext_{version}_x64.app.tar.gz"),
              ("windows-x86_64", f"jobContext_{version}_x64-setup.exe"),
              ("linux-x86_64",   f"jobContext_{version}_amd64.AppImage"),
          ]:
              e = entry(name)
              if e:
                  platforms[key] = e
          if not platforms:
              print("no signed updater artifacts found — skipping latest.json")
              raise SystemExit(0)
          manifest = {
              "version": version,
              "notes": f"jobContext Desktop {version}",
              "pub_date": datetime.datetime.now(datetime.timezone.utc)
                  .isoformat(timespec="seconds").replace("+00:00", "Z"),
              "platforms": platforms,
          }
          pathlib.Path("latest.json").write_text(json.dumps(manifest, indent=2))
          print(f"latest.json: {sorted(platforms)}")
          PYEOF
          if [ -f latest.json ]; then
            files+=(latest.json)
          fi

          # Install notes prepended above the auto-generated changelog. These
          # builds aren't Apple-notarized yet (Phase 7), so testers need the
          # quarantine workaround; Windows is Authenticode-signed but new-cert
          # SmartScreen reputation is still accruing.
          cat > NOTES.md <<'EOF'
          ## Installing this beta

          **macOS** — download `jobContext_*.dmg`, drag jobContext to Applications,
          and double-click to open. These builds are signed and notarized by
          Apple, so it should just open. (Apple Silicon → `aarch64` dmg; Intel
          Mac → `x64` dmg.) If you ever *do* hit a "damaged" or quarantine
          warning, this clears it:

          ```
          xattr -dr com.apple.quarantine /Applications/jobContext.app
          ```

          **Windows** — download `jobContext_*_x64-setup.exe` (per-user install,
          no admin prompt). It's code-signed, but until the certificate builds
          reputation SmartScreen may warn — click **More info → Run anyway**.

          **Linux** — `.AppImage` (chmod +x and run) or `.deb` (`sudo dpkg -i`).

          ---
          EOF

          # --target creates the tag at the pinned commit when it doesn't
          # exist yet (workflow_dispatch); on tag-push the tag already
          # exists and gh ignores it.
          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${TARGET}" \
            --prerelease \
            --title "jobContext Desktop ${TAG#desktop-}" \
            --notes-file NOTES.md \
            --generate-notes \
            "${files[@]}"

          # Refresh the rolling updater channel: a fixed-tag release whose
          # only job is hosting the newest latest.json at a stable URL.
          if [ -f latest.json ]; then
            if ! gh release view desktop-latest --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              gh release create desktop-latest \
                --repo "${GITHUB_REPOSITORY}" \
                --prerelease \
                --title "Desktop updater channel" \
                --notes "Machine-consumed update manifest for jobContext Desktop's auto-updater. Install from the newest desktop-v* release, not from here."
            fi
            gh release upload desktop-latest latest.json --clobber --repo "${GITHUB_REPOSITORY}"
            echo "updater channel now points at ${TAG}"
          fi

name: Desktop Build (reusable)

# The desktop build matrix, shared by:
#   desktop-backend.yml — CI on branch pushes (no version input)
#   desktop-release.yml — desktop-v* tags (stamps the version everywhere)
#
# Per platform: freeze the sidecar (packaging/pyinstaller/*.spec), run the
# frozen binary's --selftest, then bundle the Tauri shell into installers:
# dmg (macOS arm64 + Intel), NSIS exe + msi (Windows, Authenticode-signed
# via Azure Trusted Signing when secrets are present), AppImage + deb (Linux).
#
# Completely separate from deploy.yml (AKS) — the cloud product never
# builds or ships from here.

on:
  workflow_call:
    inputs:
      version:
        description: "Tag-derived version (e.g. desktop-v1.3.0-beta.1); empty = dev build"
        type: string
        default: ""

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    env:
      # Azure Trusted Signing (Windows Authenticode). Empty on forks /
      # secretless runs — every signing step is guarded on CLIENT_ID.
      AZURE_CLIENT_ID: ${{ secrets.AZURE_SIGNING_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_SIGNING_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_SIGNING_TENANT_ID }}
      RAW_VERSION: ${{ inputs.version }}
      # Apple Developer ID signing + notarization (macOS). Empty on forks /
      # secretless runs — the import step is guarded on APPLE_CERTIFICATE,
      # and Tauri only signs/notarizes when the env vars below are populated.
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      # Tauri updater artifact signing (all platforms). Empty on forks —
      # updater artifacts are simply skipped without it.
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macos-arm64
            binary: dist/jobcontext-backend/jobcontext-backend
            bundles: dmg
            installer_glob: |
              desktop/src-tauri/target/release/bundle/dmg/*.dmg
              desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
              desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          # macos-13 was retired 2025-12-08; macos-15-intel is the last Intel
          # image (until Fall 2027). Plan to go arm64-only when it sunsets.
          - os: macos-15-intel
            label: macos-x64
            binary: dist/jobcontext-backend/jobcontext-backend
            bundles: dmg
            installer_glob: |
              desktop/src-tauri/target/release/bundle/dmg/*.dmg
              desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
              desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          - os: windows-latest
            label: windows-x64
            binary: dist/jobcontext-backend/jobcontext-backend.exe
            bundles: nsis,msi
            installer_glob: |
              desktop/src-tauri/target/release/bundle/nsis/*.exe
              desktop/src-tauri/target/release/bundle/nsis/*.sig
              desktop/src-tauri/target/release/bundle/msi/*.msi
          - os: ubuntu-22.04    # oldest supported glibc for AppImage compatibility
            label: linux-x64
            binary: dist/jobcontext-backend/jobcontext-backend
            bundles: appimage,deb
            installer_glob: |
              desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              desktop/src-tauri/target/release/bundle/appimage/*.sig
              desktop/src-tauri/target/release/bundle/deb/*.deb

    steps:
      - uses: actions/checkout@v4

      # ── Native libs for WeasyPrint ─────────────────────────────────────────
      - name: Install Pango/Cairo (macOS)
        if: runner.os == 'macOS'
        # WeasyPrint resolves Homebrew dylibs via dyld fallback paths; the
        # runner doesn't have brew's lib dir there by default. The PyInstaller
        # hook imports weasyprint at build time to find (and collect) the
        # dylibs, so the build env must resolve them or the bundle ships empty.
        run: |
          brew install pango gdk-pixbuf libffi
          echo "DYLD_FALLBACK_LIBRARY_PATH=$(brew --prefix)/lib" >> "$GITHUB_ENV"

      - name: Install Pango/Cairo (Linux)
        if: runner.os == 'Linux'
        # No libharfbuzz-subset0: on jammy libharfbuzz0b ships libharfbuzz-subset.so.0
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 \
            libharfbuzz0b libfontconfig1 shared-mime-info

      - name: Install MSYS2 GTK runtime (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-pango mingw-w64-x86_64-gdk-pixbuf2

      - name: Expose MSYS2 DLLs to WeasyPrint (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # setup-msys2 installs under RUNNER_TEMP\msys64 on hosted runners
          echo "WEASYPRINT_DLL_DIRECTORIES=${RUNNER_TEMP}\\msys64\\mingw64\\bin" >> "$GITHUB_ENV"
          echo "${RUNNER_TEMP}\\msys64\\mingw64\\bin" >> "$GITHUB_PATH"

      # ── Build the React SPA (bundled into the sidecar) ────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build SPA
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # ── Freeze the backend ────────────────────────────────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      # Release builds: stamp lib/version.py (the single version source —
      # /healthz + API docs) from the tag before freezing.
      - name: Stamp version
        if: inputs.version != ''
        shell: bash
        run: |
          VERSION="${RAW_VERSION#desktop-v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          python - <<'EOF'
          import os, pathlib, re
          version = os.environ["RAW_VERSION"].removeprefix("desktop-v")
          path = pathlib.Path("lib/version.py")
          path.write_text(re.sub(r'__version__ = ".*"', f'__version__ = "{version}"', path.read_text()))
          print("stamped lib/version.py:", version)
          EOF

      # Fail fast if WeasyPrint's native libs aren't resolvable in the build
      # env — otherwise the PyInstaller hook silently collects nothing and
      # the failure only shows up at selftest.
      - name: Verify WeasyPrint imports in build env
        shell: bash
        run: python -c "import weasyprint; print('weasyprint', weasyprint.__version__)"

      - name: PyInstaller build
        run: pyinstaller packaging/pyinstaller/jobcontext-backend.spec --noconfirm

      # The hooks-contrib WeasyPrint hook does not collect the MinGW DLL tree
      # on Windows the way it collects Homebrew dylibs on macOS — bundle the
      # GTK runtime into _internal so the artifact runs on clean machines.
      - name: Bundle GTK DLLs into _internal (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          shopt -s nullglob
          MINGW_BIN="$(cygpath -u "$RUNNER_TEMP")/msys64/mingw64/bin"
          for pat in libpango libpangowin32 libpangocairo libpangoft2 libcairo \
                     libglib libgobject libgio libgmodule libharfbuzz libfontconfig \
                     libfreetype libfribidi libthai libdatrie libpixman libpng16 \
                     zlib1 libexpat libbz2 libbrotli libintl libiconv libffi \
                     libpcre2 libgraphite2 libgdk_pixbuf libjpeg libtiff libstdc++ \
                     libgcc libwinpthread libssp; do
            cp -v "${MINGW_BIN}/${pat}"*.dll dist/jobcontext-backend/_internal/ 2>/dev/null || true
          done

      # ── Prove the frozen binary works headless ────────────────────────────
      - name: Selftest frozen binary
        shell: bash
        run: |
          # Simulate a clean machine: the bundle must not lean on the build
          # env (MSYS2 PATH entries / WEASYPRINT_DLL_DIRECTORIES / brew paths).
          unset WEASYPRINT_DLL_DIRECTORIES DYLD_FALLBACK_LIBRARY_PATH
          if [ "$RUNNER_OS" = "Windows" ]; then
            export PATH="$(echo "$PATH" | tr ':' '\n' | grep -vi msys64 | paste -sd: -)"
          fi
          "${{ matrix.binary }}" --data-dir "${{ runner.temp }}/jc-selftest" --selftest

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobcontext-backend-${{ matrix.label }}
          path: dist/jobcontext-backend/
          retention-days: 14

      # ── Bundle the Tauri shell into installers ────────────────────────────
      - name: Install Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            file patchelf

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # ── Windows Authenticode via Azure Trusted Signing (Phase 7) ─────────
      # Signs with the jobContext account's jobcontext-public profile through
      # trusted-signing-cli. Guarded on the secrets so forks and secretless
      # runs still produce (unsigned) installers.
      - name: Install trusted-signing-cli (Windows)
        if: runner.os == 'Windows' && env.AZURE_CLIENT_ID != ''
        run: cargo install trusted-signing-cli --locked

      - name: Stage sidecar into shell resources
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ] && [ -n "$AZURE_CLIENT_ID" ]; then
            trusted-signing-cli -e https://eus.codesigning.azure.net \
              -a jobContext -c jobcontext-public \
              dist/jobcontext-backend/jobcontext-backend.exe
          fi
          mkdir -p desktop/src-tauri/binaries
          cp -R dist/jobcontext-backend desktop/src-tauri/binaries/

      # ── Apple Developer ID signing prep (Phase 7) ────────────────────────
      # Signing happens AFTER Tauri bundles, on the final .app, with rcodesign
      # (pure-Rust apple-codesign — no keychain needed, takes the .p12 file
      # directly). Pre-bundle signing of the sidecar can never work: Tauri's
      # resource copy dereferences symlinks, so the .app ends up with real
      # duplicate Python binaries (_internal/Python, Python.framework/Python)
      # that no pre-bundle signature covers — exactly the paths Apple rejected.
      # This step only stages the credentials and installs rcodesign.
      - name: Prepare Apple signing materials (macOS)
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        shell: bash
        run: |
          set -euo pipefail
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          printf '%s' "$APPLE_CERTIFICATE_PASSWORD" > "$RUNNER_TEMP/cert.pass"

          # Notary API key. Normalize the PEM through openssl: a stored key
          # with an unwrapped body is rejected by strict parsers, so re-emit
          # standard 64-col wrapping regardless of how the secret was stored.
          echo "$APPLE_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.raw.p8"
          openssl pkey -in "$RUNNER_TEMP/AuthKey.raw.p8" -out "$RUNNER_TEMP/AuthKey.p8"
          rm -f "$RUNNER_TEMP/AuthKey.raw.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"

          if ! command -v rcodesign >/dev/null; then
            cargo install apple-codesign --locked
          fi

      - name: Build installers
        working-directory: desktop
        shell: bash
        env:
          # AppImage bundling on hosted runners fails stripping the AppRun;
          # harmless to skip (no symbols worth stripping in release anyway).
          NO_STRIP: "true"
        run: |
          npm ci
          npm run icon
          # MSI (WiX) rejects non-numeric pre-release versions: WiX ProductVersion
          # allows only a numeric 4th field, so a semver pre-release tag like
          # 1.0.0-beta.1 fails "pre-release identifier must be numeric-only". Drop
          # msi for pre-release versions (any '-' in VERSION); keep it for finals
          # and branch CI (empty VERSION). NSIS is the per-user installer testers
          # use anyway; msi is only for enterprise (Group Policy / SCCM).
          BUNDLES="${{ matrix.bundles }}"
          if [ "$RUNNER_OS" = "Windows" ] && printf '%s' "${VERSION:-}" | grep -q -- '-'; then
            BUNDLES="$(printf '%s' "$BUNDLES" | tr ',' '\n' | grep -vx msi | paste -sd, -)"
            echo "pre-release version ${VERSION} — Windows bundles: ${BUNDLES} (msi dropped)"
          fi
          # One merged --config overlay: release version stamp, the Windows
          # signCommand, and updater artifacts (.sig files via the
          # TAURI_SIGNING_* secrets). macOS skips createUpdaterArtifacts —
          # Tauri would tar the .app BEFORE rcodesign signs it, so the mac
          # signing step builds the updater archive itself from the signed app.
          OVERLAY=""
          BUNDLE_OVERLAY=""
          if [ -n "${VERSION:-}" ]; then
            OVERLAY+="\"version\":\"${VERSION}\","
          fi
          if [ "$RUNNER_OS" = "Windows" ] && [ -n "$AZURE_CLIENT_ID" ]; then
            BUNDLE_OVERLAY+="\"windows\":{\"signCommand\":\"trusted-signing-cli -e https://eus.codesigning.azure.net -a jobContext -c jobcontext-public %1\"},"
          fi
          if [ "$RUNNER_OS" != "macOS" ] && [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            BUNDLE_OVERLAY+="\"createUpdaterArtifacts\":true,"
          fi
          if [ -n "$BUNDLE_OVERLAY" ]; then
            OVERLAY+="\"bundle\":{${BUNDLE_OVERLAY%,}},"
          fi
          EXTRA=()
          if [ -n "$OVERLAY" ]; then
            EXTRA+=(--config "{${OVERLAY%,}}")
          fi
          if [ "$RUNNER_OS" = "macOS" ] && [ -n "$APPLE_CERTIFICATE" ]; then
            # Build only the bare .app and keep Tauri away from signing and
            # notarization entirely (it signs whenever APPLE_CERTIFICATE /
            # APPLE_SIGNING_IDENTITY are visible). The next step signs the
            # final .app with rcodesign — signing before or during bundling
            # can't cover the duplicate Mach-Os Tauri's symlink-dereferencing
            # resource copy creates — and packages the dmg itself.
            env -u APPLE_CERTIFICATE -u APPLE_CERTIFICATE_PASSWORD \
                -u APPLE_SIGNING_IDENTITY -u APPLE_API_KEY -u APPLE_API_ISSUER \
                -u APPLE_API_KEY_PATH \
              npm run build -- --bundles app "${EXTRA[@]}"
          else
            npm run build -- --bundles "$BUNDLES" "${EXTRA[@]}"
          fi

      # Sign the FINAL .app — every Mach-O inside it, including the duplicate
      # Python binaries Tauri's resource copy materialized — then package the
      # dmg ourselves with Tauri's naming so the artifact glob and release
      # flow are unchanged. Two passes because rcodesign 0.29's unscoped
      # settings only reach the main executable of the path being signed:
      #   1. the sidecar exe as its own unit → hardened runtime + entitlements
      #      (required by notarization AND to launch frozen CPython at all);
      #   2. the whole .app with the sidecar exe --exclude'd so pass 2 keeps
      #      pass 1's signature instead of re-signing it bare.
      # (`--code-signature-flags <path>:runtime` scoping hits a parser bug in
      # rcodesign 0.29, so per-path flags can't do this in one pass.)
      - name: Sign app & package dmg via rcodesign (macOS)
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        shell: bash
        run: |
          set -euo pipefail
          APP="desktop/src-tauri/target/release/bundle/macos/jobContext.app"
          ENTS="desktop/src-tauri/entitlements.plist"
          SIDECAR_EXE="Contents/Resources/binaries/jobcontext-backend/jobcontext-backend"
          RC=(rcodesign sign
              --p12-file "$RUNNER_TEMP/cert.p12"
              --p12-password-file "$RUNNER_TEMP/cert.pass"
              --code-signature-flags runtime
              --entitlements-xml-file "$ENTS")
          "${RC[@]}" "$APP/$SIDECAR_EXE"
          "${RC[@]}" --exclude "$SIDECAR_EXE" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign --display --verbose=2 "$APP/$SIDECAR_EXE" 2>&1 | grep runtime

          # Package a styled dmg (branded background, drag-to-Applications
          # layout — desktop/src-tauri/dmg-settings.py) with Tauri's naming:
          # jobContext_<version>_<aarch64|x64>.dmg in bundle/dmg/. dmgbuild
          # writes the .DS_Store directly, no Finder needed; verified that its
          # copy preserves the app's signature (deep-strict passes inside the
          # mounted image).
          DMG_VERSION="${VERSION:-$(python -c "import json; print(json.load(open('desktop/src-tauri/tauri.conf.json'))['version'])")}"
          case "$(uname -m)" in
            arm64) DMG_ARCH="aarch64" ;;
            *)     DMG_ARCH="x64" ;;
          esac
          DMG_DIR="desktop/src-tauri/target/release/bundle/dmg"
          DMG="$DMG_DIR/jobContext_${DMG_VERSION}_${DMG_ARCH}.dmg"
          mkdir -p "$DMG_DIR"
          pip install --quiet dmgbuild
          dmgbuild -s desktop/src-tauri/dmg-settings.py -D app="$APP" "jobContext" "$DMG"
          rcodesign sign --p12-file "$RUNNER_TEMP/cert.p12" \
            --p12-password-file "$RUNNER_TEMP/cert.pass" "$DMG"
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/cert.pass"
          echo "signed dmg: $DMG"

          # Updater artifact: tar of the SIGNED .app + minisign signature.
          # (Tauri's own createUpdaterArtifacts would archive the pre-signing
          # app, so it's disabled on macOS and built here instead.)
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            MAC_DIR="desktop/src-tauri/target/release/bundle/macos"
            rm -f "$MAC_DIR"/*.app.tar.gz "$MAC_DIR"/*.app.tar.gz.sig
            UPDATER_TAR="$MAC_DIR/jobContext_${DMG_VERSION}_${DMG_ARCH}.app.tar.gz"
            tar -czf "$UPDATER_TAR" -C "$MAC_DIR" jobContext.app
            # The tauri CLI reads TAURI_SIGNING_PRIVATE_KEY(_PASSWORD) from
            # the environment; passing key flags as well is a CLI conflict.
            (cd desktop && npx tauri signer sign "$GITHUB_WORKSPACE/$UPDATER_TAR")
            test -s "$UPDATER_TAR.sig"
            echo "updater artifact: $UPDATER_TAR"
          fi

      # Notarize the signed dmg ourselves so the submission log is visible.
      # The Notary log lists every issue (unsigned/unhardened Mach-O, bad
      # entitlements, …); on Accepted we staple the dmg for offline Gatekeeper.
      # Apple's `notarytool submit` crashes (Trace/BPT trap: 5 → exit 133) on
      # the GitHub macOS runner images — a known notarytool bug, deterministic
      # across arches. Submit to the Notary API directly with rcodesign
      # (pure-Rust apple-codesign), which is reliable in CI and prints a clear
      # reason on rejection. --staple attaches the ticket for offline Gatekeeper.
      - name: Notarize & staple via rcodesign (macOS)
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        shell: bash
        run: |
          set -euo pipefail
          rcodesign encode-app-store-connect-api-key \
            --output-path /tmp/asc-api-key.json \
            "$APPLE_API_ISSUER" "$APPLE_API_KEY" "$APPLE_API_KEY_PATH"
          for dmg in desktop/src-tauri/target/release/bundle/dmg/*.dmg; do
            echo "== notarizing ${dmg} =="
            rcodesign notary-submit --api-key-file /tmp/asc-api-key.json --staple "$dmg"
            xcrun stapler validate "$dmg"
          done
          echo "macOS notarized + stapled"

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: jobcontext-installer-${{ matrix.label }}
          path: ${{ matrix.installer_glob }}
          retention-days: 14
          if-no-files-found: error

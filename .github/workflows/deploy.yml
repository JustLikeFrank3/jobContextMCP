name: Build & Deploy to AKS

on:
  push:
    branches:
      - qa
      - main
  workflow_dispatch:

env:
  ACR: jcmcpacr.azurecr.io
  IMAGE: jcmcpacr.azurecr.io/jcmcp
  AKS_CLUSTER: jcmcp-aks
  AKS_RG: jcmcp-rg
  K8S_NAMESPACE: jcmcp
  K8S_DEPLOYMENT: jcmcp
  K8S_CONTAINER: jcmcp
  LLM_PROVIDER: foundry
  FOUNDRY_ENDPOINT: https://jobcontextmcp-resource.services.ai.azure.com
  FOUNDRY_DEPLOYMENT: gpt-4.1-mini
  FOUNDRY_API_VERSION: 2025-01-01-preview
  STORAGE_ACCOUNT: jcmcpstore
  ENTRA_OWNER_OID: ${{ secrets.ENTRA_OWNER_OID }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -m "not live_llm" --cov --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  badges:
    needs: test
    # Only on direct pushes to long-lived branches — never on PRs or manual runs,
    # and skip the commit the bot itself pushes (guarded by [skip ci] below).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Measure suite (full, including mocked live_llm)
        run: pytest --cov --cov-report=xml --junitxml=junit.xml -q

      - name: Regenerate README badges
        run: python scripts/update_readme_badges.py --junit junit.xml --coverage coverage.xml --readme README.md

      - name: Commit badge changes if any
        run: |
          if git diff --quiet -- README.md; then
            echo "README badges already current — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: auto-update README badges [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

  sonar:
    needs: test
    runs-on: ubuntu-latest
    # No continue-on-error: surface SonarCloud failures (e.g. rejected
    # branch analysis, quality-gate errors) instead of silently swallowing
    # them. Deploy is independent (needs: test), so it still proceeds.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RG }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Deploy new image
        run: |
          # Substitute placeholders and apply configmap + deployment so all
          # changes are picked up on every deploy — not just the image tag.
          ACR_NAME=$(echo "${{ env.ACR }}" | cut -d. -f1)
          sed \
            -e "s|__LLM_PROVIDER__|${{ env.LLM_PROVIDER }}|g" \
            -e "s|__FOUNDRY_ENDPOINT__|${{ env.FOUNDRY_ENDPOINT }}|g" \
            -e "s|__FOUNDRY_DEPLOYMENT__|${{ env.FOUNDRY_DEPLOYMENT }}|g" \
            -e "s|__FOUNDRY_API_VERSION__|${{ env.FOUNDRY_API_VERSION }}|g" \
            -e "s|__STORAGE_ACCOUNT__|${{ env.STORAGE_ACCOUNT }}|g" \
            -e "s|__ENTRA_OWNER_OID__|${{ env.ENTRA_OWNER_OID }}|g" \
            k8s/configmap.yaml | kubectl apply -f - -n ${{ env.K8S_NAMESPACE }}
          sed "s|<ACR_NAME>|${ACR_NAME}|g; s|<IMAGE_TAG>|${{ github.sha }}|g" \
            k8s/deployment.yaml | \
            kubectl apply -f - -n ${{ env.K8S_NAMESPACE }}
          kubectl apply -f k8s/ingress.yaml -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT }} \
            -n ${{ env.K8S_NAMESPACE }} --timeout=300s

  build-and-deploy-qa:
    needs: test
    if: github.ref == 'refs/heads/qa'
    runs-on: ubuntu-latest
    env:
      QA_K8S_NAMESPACE: jcmcp-qa
      QA_K8S_DEPLOYMENT: jcmcp-qa
      # Non-sensitive QA config — mirrors prod Foundry setup by default.
      # Override by setting these as workflow env vars or GitHub variables.
      QA_LLM_PROVIDER: foundry
      QA_FOUNDRY_ENDPOINT: https://jobcontextmcp-resource.services.ai.azure.com
      QA_FOUNDRY_DEPLOYMENT: gpt-4.1-mini
      QA_FOUNDRY_API_VERSION: 2025-01-01-preview

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push QA image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:qa-${{ github.sha }}
            ${{ env.IMAGE }}:qa-latest

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RG }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Deploy QA
        run: |
          ACR_NAME=$(echo "${{ env.ACR }}" | cut -d. -f1)
          sed \
            -e "s|__QA_LLM_PROVIDER__|${{ env.QA_LLM_PROVIDER }}|g" \
            -e "s|__QA_FOUNDRY_ENDPOINT__|${{ env.QA_FOUNDRY_ENDPOINT }}|g" \
            -e "s|__QA_FOUNDRY_DEPLOYMENT__|${{ env.QA_FOUNDRY_DEPLOYMENT }}|g" \
            -e "s|__QA_FOUNDRY_API_VERSION__|${{ env.QA_FOUNDRY_API_VERSION }}|g" \
            -e "s|__QA_STORAGE_ACCOUNT__|${{ secrets.QA_STORAGE_ACCOUNT }}|g" \
            -e "s|__QA_ENTRA_OWNER_OID__|${{ secrets.ENTRA_OWNER_OID }}|g" \
            k8s/qa/configmap.yaml | kubectl apply -f - -n ${{ env.QA_K8S_NAMESPACE }}
          sed "s|<ACR_NAME>|${ACR_NAME}|g; s|<IMAGE_TAG>|qa-${{ github.sha }}|g" \
            k8s/qa/deployment.yaml | \
            kubectl apply -f - -n ${{ env.QA_K8S_NAMESPACE }}
          kubectl apply -f k8s/qa/service.yaml -n ${{ env.QA_K8S_NAMESPACE }}
          kubectl apply -f k8s/qa/ingress.yaml -n ${{ env.QA_K8S_NAMESPACE }}
          kubectl rollout status deployment/${{ env.QA_K8S_DEPLOYMENT }} \
            -n ${{ env.QA_K8S_NAMESPACE }} --timeout=300s

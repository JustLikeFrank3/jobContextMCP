[tool.pytest.ini_options]
testpaths   = ["tests"]
addopts     = "-v --tb=short"
markers     = [
    "live_llm: test exercises the real LLM client code path (with its own mocked client); opts out of the autouse offline get_llm_client stub.",
]

[tool.coverage.run]
source  = ["server", "lib", "tools"]
omit    = ["tests/*", ".venv/*"]

[tool.coverage.report]
show_missing   = true
skip_covered   = false
# Current: ~82% total. Next-largest gaps: tools/latex_export.py (~48%),
# tools/health.py (~49%), tools/resume.py (~55%). Raise this gate as they land.
fail_under     = 80

[tool.pytest.ini_options]
testpaths   = ["tests"]
addopts     = "-v --tb=short"
markers     = [
    "live_llm: test exercises the real LLM client code path (with its own mocked client); opts out of the autouse offline get_llm_client stub.",
]

[tool.coverage.run]
source  = ["server", "lib", "tools"]
omit    = ["tests/*", ".venv/*"]

[tool.coverage.report]
show_missing   = true
skip_covered   = false
# Current: 80% total. Biggest remaining gap is lib/rag.py (0% — no offline tests).
# Add tests there for durable headroom before raising this gate further.
fail_under     = 80
